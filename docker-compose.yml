version: '3.8'

services:
  db:
    # 1. PostgreSQL 16 공식 이미지로 변경 (Render 18 버전과 호환 가능)
    image: postgres:16-alpine
    environment:
      # 2. PostgreSQL용 환경 변수 설정
      POSTGRES_DB: filehub
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      # 3. PostgreSQL 기본 포트(5432) 매핑
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 4. 컨테이너 생성 시 sql을 자동으로 밀어 넣는 경로 추가
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-schema.sql
    # 5. PostgreSQL용 헬스체크 명령어로 변경
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      # 6. 백엔드가 컨테이너 내부 DB와 통신할 때 활용할 환경 변수 매핑
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "8080:8080"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: # 볼륨 이름도 직관적으로 변경
  upload_data: