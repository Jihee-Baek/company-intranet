server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

spring:
  sql:
    init:
      mode: always
      # schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  profiles:
    active: local
  datasource:
    # url: ${DB_URL:jdbc:mysql://localhost:3306/filehub?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    # username: ${DB_USERNAME:root}
    # password: ${DB_PASSWORD}
    # driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/filehub}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:filehub_0e2i_user}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # dialect: org.hibernate.dialect.MySQLDialect
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24시간
  file:
    upload-dir: ./uploads
    max-size-mb: 100
    retention-days: 30

logging:
  level:
    com.company.filehub: DEBUG
